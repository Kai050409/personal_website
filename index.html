<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaining Zhang</title>
    <link rel="icon" type="image/png" href="erbao.png">
    <style>
        /* 1. 全局重置 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            height: 100%;
            background-color: #ffffff;
            color: #111;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
            transition: background-color 0.5s;
        }

        /* --- 2. 背景照片层 --- */
        .preview-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            opacity: 0; 
            visibility: hidden;
            transition: opacity 0.7s ease-in-out;
            pointer-events: none;
            background-size: cover;
            background-position: center;
        }
        
        /* 当激活预览时的状态 */
        body.preview-active .preview-overlay {
            opacity: 1;
            visibility: visible;
        }

        /* --- 3. 页面内容主容器 --- */
        .landing-container {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center;
        }

        /* --- 4. 顶部栏 --- */
        .top-bar { 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 50px 60px;
            display: flex;
            justify-content: center; 
            align-items: center;
            z-index: 100;
            transition: color 0.5s;
        }

        .brand a { 
            text-decoration: none; 
            display: flex; 
            flex-direction: row; 
            align-items: baseline; 
            gap: 40px; 
        }
        
        .name-unit { font-size: 0.85rem; font-weight: 400; text-transform: uppercase; transition: color 0.5s ease; }
        .name-en { font-family: "Garamond", "Eb Garamond", serif; color: #0066CC; letter-spacing: 2px; font-style: italic; }
        .name-zh { font-family: "Songti SC", "STSong", "SimSun", serif; color: #C41E3A; letter-spacing: 12px; font-weight: 300; }
        .name-mn { color: #FFB800; letter-spacing: 1px; opacity: 0.7; }

        .about-link {
            position: absolute;
            right: 60px;
            text-decoration: none;
            color: #000;
            font-size: 0.8rem;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-family: "Garamond", "Eb Garamond", serif;
            transition: color 0.3s;
        }

        /* --- 5. 项目列表 --- */
        .project-list {
            display: flex;
            flex-direction: column;
            gap: 40px; 
            text-align: center;
            width: 100%;
        }

        .project-item {
            text-decoration: none;
            color: #000;
            font-size: 2.2rem; 
            font-weight: 700;
            letter-spacing: 12px;
            text-transform: uppercase;
            font-family: "Garamond", "Eb Garamond", serif;
            transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            cursor: pointer;
            display: block;
        }

        /* 悬停时的文字排版变化 */
        .project-item:hover {
            letter-spacing: 30px;
            color: #ffffff !important; /* 悬停时强制变白以适应背景图 */
        }

        /* 列表整体被悬停时，非悬停项目的淡化 */
        .project-list:hover .project-item:not(:hover) {
            opacity: 0.1;
        }

        /* --- 6. 模式切换效果 (反相效果) --- */
        body.preview-active .top-bar,
        body.preview-active .about-link,
        body.preview-active .name-en,
        body.preview-active .name-zh,
        body.preview-active .name-mn {
            color: #ffffff;
            mix-blend-mode: difference;
        }

        /* 响应式适配 */
        @media (max-width: 900px) {
            .brand a { flex-direction: column; align-items: center; gap: 15px; }
            .top-bar { padding: 30px 20px; flex-direction: column; }
            .about-link { position: relative; right: auto; margin-top: 20px; }
            .project-item { font-size: 1.3rem; letter-spacing: 5px; }
            .project-item:hover { letter-spacing: 10px; }
        }
    </style>
</head>
<body>

    <div class="preview-overlay" id="bg-overlay"></div>

    <div class="landing-container">
        
        <header class="top-bar">
            <div class="brand">
                <a href="index.html">
                    <span class="name-unit name-en">Kaining Zhang</span>
                    <span class="name-unit name-zh">张凯宁</span>
                    <span class="name-unit name-mn">ᠵᠠᠩ ᡴᠠᡳ ᠨᡳᠩ</span>
                </a>
            </div>
            <a href="about.html" class="about-link">About</a>
        </header>

        <nav class="project-list">
            <a href="so-it-goes.html" class="project-item" data-img="images/so_it_goes.jpg">So It Goes</a>
            <a href="cyber-warhol.html" class="project-item" data-img="images/warhol_preview.jpg">Cyber Warhol</a>
        </nav>

    </div>

    <script>
        const projectItems = document.querySelectorAll('.project-item');
        const bgOverlay = document.getElementById('bg-overlay');
        const body = document.body;

        projectItems.forEach(item => {
            item.addEventListener('mouseenter', () => {
                const imgPath = item.getAttribute('data-img');
                if (imgPath) {
                    // 设置背景图
                    bgOverlay.style.backgroundImage = `url('${imgPath}')`;
                    // 激活显示状态
                    body.classList.add('preview-active');
                }
            });

            item.addEventListener('mouseleave', () => {
                // 隐藏背景图
                body.classList.remove('preview-active');
            });
        });
    </script>

</body>
</html>
