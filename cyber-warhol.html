<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kaining Zhang - Cyber Warhol Lab</title>
    <style>
        /* 1. 视觉重置与主页对齐 */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background-color: #ffffff; 
            color: #111; 
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; 
            overflow-x: hidden;
            overscroll-behavior-y: contain;
        }

        /* 2. 品牌导航栏 - 严谨复刻主页设计 */
        .top-bar { 
            width: 100%; 
            padding: 30px 40px; 
            display: flex; 
            justify-content: center; 
            position: fixed; 
            top: 0; 
            background: rgba(255,255,255,0.9); 
            backdrop-filter: blur(10px); 
            z-index: 1000; 
        }

        .brand a { 
            text-decoration: none; 
            display: flex; 
            flex-direction: row; 
            align-items: baseline; 
            gap: 40px; 
        }

        .name-unit { font-size: 0.85rem; font-weight: 400; text-transform: uppercase; white-space: nowrap; transition: 0.3s; }
        .name-en { font-family: "Garamond", serif; color: #0066CC; letter-spacing: 2px; font-style: italic; }
        .name-zh { font-family: "Songti SC", serif; color: #C41E3A; letter-spacing: 12px; }
        .name-mn { color: #FFB800; letter-spacing: 1px; opacity: 0.8; } /* 满文标识 */

        /* 3. 核心交互区域 */
        #upload-section { height: 100vh; display: flex; align-items: center; justify-content: center; }
        .upload-trigger { 
            padding: 60px 40px; border: 1px dashed #ccc; cursor: pointer;
            font-family: "Garamond", serif; letter-spacing: 3px; font-size: 0.9rem; color: #666;
            transition: 0.3s;
        }
        .upload-trigger:hover { border-color: #000; color: #000; }

        #editor-section { display: none; min-height: 100vh; flex-direction: column; align-items: center; padding: 120px 20px 200px 20px; }
        
        #warhol-grid { display: grid; gap: 15px; width: 100%; max-width: 1200px; }
        canvas { width: 100% !important; height: auto !important; box-shadow: 0 10px 40px rgba(0,0,0,0.05); }

        /* 4. 移动端优化控制中心 */
        .floating-controls { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            width: 90%; max-width: 550px; 
            background: rgba(255, 255, 255, 0.98); 
            backdrop-filter: blur(20px); 
            padding: 20px; border-radius: 30px; 
            border: 1px solid rgba(0,0,0,0.08); 
            box-shadow: 0 15px 45px rgba(0,0,0,0.12);
            display: flex; flex-direction: column; gap: 15px; z-index: 1001;
        }

        .control-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
        .guide-txt { font-size: 0.6rem; letter-spacing: 2px; color: #C41E3A; font-weight: bold; text-transform: uppercase; }
        
        .spectrum-bar { flex-grow: 1; height: 14px; background: linear-gradient(to right, #f00, #ff0, #0f0, #0ff, #00f, #f0f, #f00); border-radius: 7px; cursor: crosshair; }
        .color-pool { display: flex; gap: 8px; flex-wrap: wrap; }
        .color-dot { width: 22px; height: 22px; border-radius: 50%; border: 1px solid #eee; cursor: pointer; }

        .slider-wrap { display: flex; align-items: center; gap: 12px; flex-grow: 1; font-size: 0.6rem; letter-spacing: 1px; }
        input[type="range"] { -webkit-appearance: none; flex-grow: 1; height: 2px; background: #eee; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; background: #111; border-radius: 50%; cursor: pointer; }

        .export-btn { 
            background: #111; color: #fff; border: none; padding: 10px 20px; 
            font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; border-radius: 20px; cursor: pointer;
        }

        /* 5. 极窄屏幕适配 */
        @media (max-width: 700px) {
            .brand a { gap: 15px; }
            .name-unit { font-size: 0.65rem; }
            .name-zh { letter-spacing: 4px; }
            .top-bar { padding: 20px; }
            #warhol-grid { gap: 10px; }
        }
        
        @media (max-width: 480px) {
            .brand a { gap: 8px; }
            .name-unit { font-size: 0.55rem; }
            .name-zh { letter-spacing: 2px; }
            .name-mn { display: none; } /* 极窄时隐藏满文防止重叠 */
        }
    </style>
</head>
<body>

    <header class="top-bar">
        <div class="brand">
            <a href="index.html">
                <span class="name-unit name-en">Kaining Zhang</span>
                <span class="name-unit name-zh">张凯宁</span>
                <span class="name-unit name-mn">ᠵᠠᠩ ᡴᠠᡳ ᠨᡳᠩ</span>
            </a>
        </div>
    </header>

    <div id="upload-section">
        <label class="upload-trigger" for="file-input">SELECT PHOTO TO BEGIN</label>
        <input type="file" id="file-input" accept="image/*" style="display:none">
    </div>

    <div id="editor-section">
        <div id="warhol-grid"></div>

        <div class="floating-controls">
            <div class="control-row">
                <span class="guide-txt">Pick Colors</span>
                <div class="color-pool" id="color-pool"></div>
                <button class="export-btn" id="dl-btn">Export Poster</button>
            </div>
            
            <div class="control-row">
                <div class="spectrum-bar" id="spectrum"></div>
            </div>

            <div class="control-row">
                <div class="slider-wrap">
                    <span>QTY: <span id="qty-val">4</span></span>
                    <input type="range" id="qty-slider" min="1" max="12" value="4">
                </div>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const spectrum = document.getElementById('spectrum');
        const colorPool = document.getElementById('color-pool');
        const grid = document.getElementById('warhol-grid');
        const qtySlider = document.getElementById('qty-slider');
        const qtyVal = document.getElementById('qty-val');
        const dlBtn = document.getElementById('dl-btn');

        let userImg = null;
        let selectedColors = []; 

        fileInput.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                userImg = new Image();
                userImg.onload = () => {
                    document.getElementById('upload-section').style.display = 'none';
                    document.getElementById('editor-section').style.display = 'flex';
                    render();
                };
                userImg.src = ev.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        qtySlider.oninput = () => {
            qtyVal.innerText = qtySlider.value;
            render();
        };

        const addColor = (e) => {
            const rect = spectrum.getBoundingClientRect();
            const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
            const hue = (x / rect.width) * 360;
            selectedColors.push(`hsl(${hue}, 100%, 50%)`);
            if (selectedColors.length > 6) selectedColors.shift();
            render();
        };

        spectrum.addEventListener('click', addColor);
        spectrum.addEventListener('touchstart', (e) => { e.preventDefault(); addColor(e); });

        function render() {
            colorPool.innerHTML = '';
            grid.innerHTML = '';
            const count = parseInt(qtySlider.value);
            const cols = window.innerWidth < 600 ? (count > 1 ? 2 : 1) : Math.ceil(Math.sqrt(count));
            grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

            selectedColors.forEach((c, i) => {
                const dot = document.createElement('div');
                dot.className = 'color-dot';
                dot.style.background = c;
                dot.onclick = () => { selectedColors.splice(i, 1); render(); };
                colorPool.appendChild(dot);
            });

            for (let i = 0; i < count; i++) {
                const cvs = document.createElement('canvas');
                grid.appendChild(cvs);
                drawArt(cvs);
            }
        }

        function drawArt(canvas) {
            const ctx = canvas.getContext('2d');
            canvas.width = 800; canvas.height = 800 * (userImg.height / userImg.width);
            
            if (selectedColors.length === 0) {
                ctx.drawImage(userImg, 0, 0, canvas.width, canvas.height);
                return;
            }

            let pool = [...selectedColors];
            while(pool.length < 3) pool.push(pool.length === 1 ? "#000" : "#fff");
            const activeColors = pool.sort(() => Math.random() - 0.5).slice(0, 3).map(c => {
                const d = document.createElement('div'); d.style.color = c; document.body.appendChild(d);
                const rgb = getComputedStyle(d).color.match(/\d+/g).map(Number);
                document.body.removeChild(d);
                return rgb;
            });

            const off = document.createElement('canvas');
            off.width = canvas.width; off.height = canvas.height;
            const octx = off.getContext('2d');
            octx.filter = 'grayscale(100%) contrast(250%)';
            octx.drawImage(userImg, 0, 0, off.width, off.height);
            
            const data = octx.getImageData(0, 0, off.width, off.height);
            const p = data.data;
            for (let i = 0; i < p.length; i += 4) {
                const g = p[i];
                const c = g < 85 ? activeColors[0] : (g < 170 ? activeColors[1] : activeColors[2]);
                p[i] = c[0]; p[i+1] = c[1]; p[i+2] = c[2];
            }
            ctx.putImageData(data, 0, 0);
        }

        dlBtn.onclick = () => {
            const canvases = grid.querySelectorAll('canvas');
            const final = document.createElement('canvas');
            const cols = getComputedStyle(grid).gridTemplateColumns.split(' ').length;
            const rows = Math.ceil(canvases.length / cols);
            final.width = canvases[0].width * cols; final.height = canvases[0].height * rows;
            const fctx = final.getContext('2d');
            canvases.forEach((c, i) => {
                fctx.drawImage(c, (i % cols) * c.width, Math.floor(i / cols) * c.height);
            });
            const a = document.createElement('a'); a.download = 'kaining-zhang-warhol.png';
            a.href = final.toDataURL(); a.click();
        };
    </script>
</body>
</html>
