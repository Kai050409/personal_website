<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>So It Goes... | Kaining Zhang</title>
    <link rel="icon" type="image/png" href="erbao.png">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            height: 100%;
            background-color: #ffffff;
            color: #1a1a1a;
            font-family: "Avenir Next", Avenir, sans-serif;
            overflow: hidden; /* 彻底锁定，全靠点击触发 */
        }

        /* 顶部导航 */
        .top-bar {
            position: fixed; top: 0; left: 0; width: 100%; height: 80px;
            background-color: rgba(255, 255, 255, 0.8);
            z-index: 1000;
            display: flex; justify-content: center; align-items: center;
            pointer-events: none; /* 让导航栏不阻挡下方的点击事件 */
        }
        .brand a { text-decoration: none; display: flex; align-items: baseline; gap: 20px; pointer-events: auto; }
        .name-en { font-family: "Didot", serif; color: #0066CC; font-style: italic; font-size: 0.8rem; letter-spacing: 1px; }
        .name-zh { font-family: "Songti SC", serif; color: #C41E3A; font-size: 0.9rem; letter-spacing: 6px; }

        /* 画廊容器 */
        .gallery-container {
            display: flex;
            width: 100vw;
            height: 100vh;
            overflow-x: hidden; /* 禁用手动滚动条 */
            scroll-behavior: smooth;
        }

        .page-section {
            flex: 0 0 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 10vw;
        }

        /* 文字介绍 */
        .statement-box {
            max-width: 600px;
            line-height: 2;
            font-size: 0.9rem;
            color: #333;
            text-align: justify;
        }

        /* 图片与说明 */
        .photo-wrapper img {
            max-height: 75vh;
            max-width: 85vw;
            width: auto;
            height: auto;
            object-fit: contain;
            user-select: none; /* 防止长按图片弹出菜单 */
        }

        .caption {
            margin-top: 25px;
            font-size: 0.7rem;
            color: #bbb;
            letter-spacing: 1px;
        }

        /* 点击区域提示（可选：如果你想看点击范围，可以取消注释 background） */
        #click-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 500;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header class="top-bar">
        <div class="brand">
            <a href="index.html">
                <span class="name-en">Kaining Zhang</span>
                <span class="name-zh">张凯宁</span>
            </a>
        </div>
    </header>

    <div id="click-overlay"></div>

    <main class="gallery-container" id="gallery">
        
        <section class="page-section">
            <div class="statement-box">
                <p><strong>So It Goes...</strong><br><br>Is a long-term exploration of my hometown, Haicheng, and the shifting memories of my family history. Through the lens of medium and large format film.</p>
            </div>
        </section>

        <section class="page-section">
            <div class="photo-wrapper">
                <img src="so_it_goes.jpg">
                <div class="caption">No.01 / MEL-HCN / 2026</div>
            </div>
        </section>

        <section class="page-section">
            <div class="photo-wrapper">
                <img src="so_it_goes_02.jpg">
                <div class="caption">No.02 / HCN / 2026</div>
            </div>
        </section>

        <section class="page-section">
            <div class="photo-wrapper">
                <img src="so_it_goes_03.jpg">
                <div class="caption">No.03 / HCN / 2026</div>
            </div>
        </section>

        <section class="page-section">
            <div class="photo-wrapper">
                <img src="so_it_goes_04.jpg">
                <div class="caption">No.04 / HCN / 2026</div>
            </div>
        </section>

    </main>

    <script>
        const gallery = document.getElementById('gallery');
        const overlay = document.getElementById('click-overlay');
        const sections = document.querySelectorAll('.page-section');
        let currentIndex = 0;

        overlay.addEventListener('click', (e) => {
            const screenWidth = window.innerWidth;
            const clickX = e.clientX;

            if (clickX > screenWidth / 2) {
                // 点击右侧：下一张
                if (currentIndex < sections.length - 1) {
                    currentIndex++;
                }
            } else {
                // 点击左侧：上一张
                if (currentIndex > 0) {
                    currentIndex--;
                }
            }

            // 执行滚动
            gallery.scrollTo({
                left: currentIndex * window.innerWidth,
                behavior: 'smooth'
            });
        });

        // 适配窗口大小改变
        window.addEventListener('resize', () => {
            gallery.scrollLeft = currentIndex * window.innerWidth;
        });
    </script>

</body>
</html>
